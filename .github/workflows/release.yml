name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: macos-14

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate version and tag match
        run: |
          bash scripts/validate-versioning.sh
          test "${GITHUB_REF_NAME}" = "$(./scripts/version.sh tag)"

      - name: Validate release commit subject
        run: |
          expected_subject="release: ${GITHUB_REF_NAME}"
          actual_subject="$(git log -1 --pretty=%s)"

          if [[ "$actual_subject" != "$expected_subject" ]]; then
            echo "Release tags must point at a commit named '$expected_subject'. Found '$actual_subject'." >&2
            exit 1
          fi

      - name: Build release assets
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/package-release.sh

      - name: Render release notes
        run: ./scripts/render-release-notes.sh dist/release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: dist/release-notes.md
          files: |
            dist/release/buoy
            dist/release/Buoy.app.zip
